<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Producto</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 50%;
            margin: 50px auto;
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #333333;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 5px;
            font-weight: bold;
            color: #555555;
        }

        input {
            font-size: 16px;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #cccccc;
            border-radius: 5px;
        }

        button {
            font-size: 18px;
            padding: 10px;
            color: white;
            background-color: #007BFF;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Agregar Producto</h1>
        <button onclick="window.location.href='/'" style="padding: 10px 20px; font-size: 16px; background-color: #007BFF; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px;">
            Volver al Inicio
        </button>
        
        <form method="POST">
            {% csrf_token %}
            <label for="articulo">Artículo</label>
            <input type="text" id="articulo" name="articulo" placeholder="Ej. Dulces">

            <label for="costo">Costo</label>
            <input type="number" id="costo" name="costo" step="0.01" placeholder="Ej. 50.00">

            <label for="venta">Venta</label>
            <input type="number" id="venta" name="venta" step="0.01" placeholder="Ej. 100.00">

            <button type="submit">Guardar Producto</button>
                        
        </form>
        
    </div>
</body>
</html>
