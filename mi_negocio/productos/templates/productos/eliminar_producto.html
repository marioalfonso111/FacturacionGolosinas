<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eliminar Producto</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        h1 {
            text-align: center;
            color: #dc3545;
        }
        .content {
            text-align: center;
            margin-top: 20px;
        }
        .actions {
            margin-top: 20px;
        }
        .actions form, .actions a {
            display: inline-block;
            margin: 0 10px;
        }
        .actions form button {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 5px;
        }
        .actions form button:hover {
            background-color: #b02a37;
        }
        .actions a {
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
        }
        .actions a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Eliminar Producto</h1>
    <div class="content">
        <p>¿Estás seguro de que deseas eliminar el producto "<strong>{{ producto.articulo }}</strong>"?</p>
        <div class="actions">
            <!-- Botón para confirmar la eliminación -->
            <form method="post">
                {% csrf_token %}
                <button type="submit">Eliminar</button>
            </form>
            <!-- Enlace para cancelar y volver -->
            <a href="{% url 'lista_productos' %}">Cancelar</a>
        </div>
    </div>
</body>
</html>
