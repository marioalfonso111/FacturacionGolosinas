<!DOCTYPE html>
<html>
<head>
    <title>Lista de Productos</title>
</head>
<body>
    <h1>Lista de productos</h1>
    <ul>
        {% for producto in productos %}
            <li>{{ producto.articulo }} - Costo: ${{ producto.costo }} - Precio de Venta: {{ producto.venta }}</li>
        {% endfor %}
    </ul>
</body>
</html>
